<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election 2026</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .leader-card {
            background: linear-gradient(45deg, #f3ec78, #af4261);
            padding: 20px;
            border-radius: 10px;
            margin: 15px;
            text-align: center;
            color: white;
        }
        .leader-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }
        .probability {
            font-weight: bold;
            font-size: 1.2em;
        }
    </style>
    <script>
        function updateProbabilities() {
            // Example function to simulate real-time probability updates
            const leaders = document.querySelectorAll('.leader-card');
            leaders.forEach(leader => {
                const probabilityDisplay = leader.querySelector('.probability');
                const newProbability = Math.floor(Math.random() * 100);
                probabilityDisplay.innerText = `Winning Probability: ${newProbability}%`;
            });
        }
        setInterval(updateProbabilities, 5000); // Update every 5 seconds
    </script>
</head>
<body>
    <h1>Election Leaders</h1>
    <div class="leaders-carousel">
        <div class="leader-card">
            <img class="leader-image" src="./images/party1_logo.png" alt="Party 1 Logo">
            <h2>Leader 1</h2>
            <p>Party 1</p>
            <div class="probability">Winning Probability: 60%</div>
        </div>
        <div class="leader-card">
            <img class="leader-image" src="./images/party2_logo.png" alt="Party 2 Logo">
            <h2>Leader 2</h2>
            <p>Party 2</p>
            <div class="probability">Winning Probability: 40%</div>
        </div>
        <!-- Additional leader cards as needed -->
    </div>
</body>
</html>
