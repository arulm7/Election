<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamil Nadu Election 2026 Prediction</title><style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

/* Navbar */
.navbar {
    padding: 15px 30px;
    background: rgba(0,0,0,0.3);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #00ffd5;
}

/* Hero */
.hero {
    text-align: center;
    padding: 80px 20px;
    animation: fadeIn 2s ease-in-out;
}

.hero h1 {
    font-size: 42px;
}

.hero p {
    font-size: 18px;
    opacity: 0.8;
}

/* Cards */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    margin: 15px;
    padding: 25px;
    width: 260px;
    border-radius: 15px;
    text-align: center;
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
    background: rgba(255,255,255,0.2);
}

.card h2 {
    margin-bottom: 10px;
}

.seats {
    font-size: 28px;
    font-weight: bold;
    color: #00ffcc;
}

/* Graph Bar */
.bar-container {
    width: 80%;
    margin: 40px auto;
}

.bar {
    height: 30px;
    margin: 10px 0;
    border-radius: 20px;
    animation: grow 2s ease forwards;
}

.dmk { background: #ff4757; width: 70%; }
.aiadmk { background: #2ed573; width: 30%; }
.others { background: #ffa502; width: 10%; }

/* Footer */
.footer {
    text-align: center;
    padding: 20px;
    opacity: 0.7;
}

/* Animations */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes grow {
    from {width: 0;}
}

</style></head><body><div class="navbar">
    <div class="logo">TN Election 2026</div>
</div><div class="hero">
    <h1>📊 Tamil Nadu Election Prediction</h1>
    <p>Based on recent opinion polls and trends</p>
</div><div class="container"><div class="card">
    <h2>DMK Alliance</h2>
    <p class="seats">140 - 180 Seats</p>
    <p>Leading in most regions</p>
</div>

<div class="card">
    <h2>AIADMK Alliance</h2>
    <p class="seats">40 - 80 Seats</p>
    <p>Main opposition</p>
</div>

<div class="card">
    <h2>Others (TVK, NTK)</h2>
    <p class="seats">10 - 20 Seats</p>
    <p>Vote influencers</p>
</div>

</div><div class="bar-container">
    <div class="bar dmk"></div>
    <div class="bar aiadmk"></div>
    <div class="bar others"></div>
</div></body>
</html>
