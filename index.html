<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TN Election 2026</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
body { margin:0; font-family:Arial; background:#111; color:white; }

/* HEADER */
.header {
    padding:15px;
    background:black;
    color:#e50914;
    font-weight:bold;
}

/* SECTION */
.section { padding:20px; }

/* LIVE */
.live span { font-weight:bold; }

/* CAROUSEL */
.carousel { overflow:hidden; }
.track {
    display:flex;
    transition: transform 0.5s ease;
}
.card {
    min-width:200px;
    margin:10px;
    background:#222;
    padding:10px;
    border-radius:8px;
    text-align:center;
}

/* MAP */
svg { width:100%; max-width:400px; }
path { fill:#333; cursor:pointer; }
path:hover { fill:#e50914; }

/* MODAL */
.modal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}
.modal-content {
    background:#222;
    padding:20px;
    border-radius:10px;
}

/* CHART */
canvas { margin-top:20px; }
</style></head><body><div class="header">TN Election Dashboard</div><!-- 🔴 LIVE --><div class="section live">
DMK: <span id="dmk">160</span> |
AIADMK: <span id="aiadmk">60</span> |
Others: <span id="others">15</span>
</div><!-- 🎬 CAROUSEL --><div class="section">
<h3>Leaders</h3>
<div class="carousel">
    <div class="track" id="track">
        <div class="card">Stalin</div>
        <div class="card">EPS</div>
        <div class="card">Vijay</div>
    </div>
</div>
</div><!-- 📊 CHART --><div class="section">
<canvas id="chart"></canvas>
</div><!-- 🗺️ MAP --><div class="section">
<svg viewBox="0 0 200 200"><path d="M20 20 L80 20 L80 80 L20 80 Z"
onclick="show('Chennai','DMK Stronghold')"/>

<path d="M100 20 L160 20 L160 80 L100 80 Z"
onclick="show('Coimbatore','Swing Region')"/>

<path d="M20 100 L80 100 L80 160 L20 160 Z"
onclick="show('Madurai','Close Fight')"/>

</svg>
</div><!-- MODAL --><div class="modal" id="modal">
<div class="modal-content">
<h3 id="title"></h3>
<p id="desc"></p>
<button onclick="closeModal()">Close</button>
</div>
</div><script>

/* 🔴 LIVE FIX */
setInterval(()=>{
    document.getElementById("dmk").innerText = 140 + Math.floor(Math.random()*20);
    document.getElementById("aiadmk").innerText = 50 + Math.floor(Math.random()*20);
    document.getElementById("others").innerText = 10 + Math.floor(Math.random()*10);
},2000);

/* 🎬 CAROUSEL FIX */
let index=0;
setInterval(()=>{
    index=(index+1)%3;
    document.getElementById("track").style.transform =
        "translateX(-"+(index*220)+"px)";
},2000);

/* 📊 CHART FIX */
new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:['DMK','AIADMK','Others'],
datasets:[{
data:[160,60,15],
backgroundColor:['red','green','yellow']
}]
}
});

/* 🗳️ MODAL FIX */
function show(t,d){
    document.getElementById("modal").style.display="flex";
    document.getElementById("title").innerText=t;
    document.getElementById("desc").innerText=d;
}
function closeModal(){
    document.getElementById("modal").style.display="none";
}

</script></body>
</html>
