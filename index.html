
<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TN Election 2026</title><style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
}

/* Header */
.header {
    text-align: center;
    padding: 60px 20px;
}

.header h1 {
    font-size: 40px;
}

.header p {
    opacity: 0.8;
}

/* Cards */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    width: 260px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 80px;
    height: 80px;
    object-fit: contain;
}

.seats {
    font-size: 24px;
    font-weight: bold;
    margin: 10px 0;
}

/* Graph */
.graph {
    width: 80%;
    margin: 50px auto;
}

.bar {
    height: 35px;
    margin: 15px 0;
    border-radius: 20px;
    display: flex;
    align-items: center;
    padding-left: 10px;
    font-weight: bold;
    animation: grow 2s ease forwards;
}

.dmk {
    background: #ff4d4d;
    width: 75%;
}

.aiadmk {
    background: #2ecc71;
    width: 35%;
}

.others {
    background: #f1c40f;
    width: 15%;
}

@keyframes grow {
    from { width: 0; }
}

/* Footer */
.footer {
    text-align: center;
    padding: 20px;
    opacity: 0.7;
}
</style></head><body><div class="header">
    <h1>📊 Tamil Nadu Election 2026</h1>
    <p>Poll-Based Prediction Dashboard</p>
</div><div class="container"><div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/en/5/5e/Dravida_Munnetra_Kazhagam_logo.png">
    <h2>DMK Alliance</h2>
    <div class="seats">140 - 180</div>
    <p>Leading</p>
</div>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/en/8/8c/AIADMK_logo.png">
    <h2>AIADMK Alliance</h2>
    <div class="seats">40 - 80</div>
    <p>Opposition</p>
</div>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Tamilaga_Vettri_Kazhagam_flag.png">
    <h2>Others (TVK)</h2>
    <div class="seats">10 - 20</div>
    <p>Influence</p>
</div>

</div><div class="graph">
    <div class="bar dmk">DMK - 160 seats</div>
    <div class="bar aiadmk">AIADMK - 60 seats</div>
    <div class="bar others">Others - 15 seats</div>
</div></body>
</html>
